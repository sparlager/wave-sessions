name: Scrape Wave Sessions

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Playwright + system deps
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run scraper with diagnostics
        run: |
          python scrape.py || true

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            *.png
            *.log

      - name: Commit sessions.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sessions.json || true
          git commit -m "Update sessions" || true
          git push || true
