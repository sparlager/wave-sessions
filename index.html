<!DOCTYPE html>
<html>
<head>
  <title>The Wave Sessions</title>
</head>
<body>
  <h1>The Wave – Live Surf Sessions</h1>
  <p>Auto-updated every 5 minutes.</p>
  <script>
    fetch('sessions.json?cache=' + Date.now())
      .then(r => r.json())
      .then(d => document.body.insertAdjacentHTML('beforeend', `<pre>${JSON.stringify(d, null, 2)}</pre>`));
  </script>
</body>
</html>
